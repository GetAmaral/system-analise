    supabase_tables:
      - calendar_events
      - profiles
    expected_behavior: "Retorna lista de eventos do usuario para o periodo solicitado (hoje, semana, mes)"
    test_scenarios:
      - happy_path_listar_hoje
      - happy_path_listar_semana
      - happy_path_listar_mes
      - edge_case_sem_eventos
      - edge_case_muitos_eventos

  - id: agenda-editar-evento
