  - id: agenda-criar-evento
    name: "Criar Evento na Agenda"
    block: agenda
    priority: CRITICA
    n8n_webhook: "webhook-test/agenda-criar"
    supabase_tables:
      - calendar_events
      - profiles
    expected_behavior: "Cria evento no Google Calendar e registra no Supabase com data, hora, titulo e descricao"
    test_scenarios:
      - happy_path_criar_evento_simples
      - happy_path_criar_evento_com_descricao
      - edge_case_evento_feriado
      - edge_case_evento_fim_de_semana
